# ──────────────────────────────────────────────
# Render 部署专用配置 (spring.profiles.active=render)
# ──────────────────────────────────────────────

spring:
  # 清除本地开发环境的 autoconfigure exclude，允许 PgVectorStore 自动配置
  autoconfigure:
    exclude:

  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 关闭 H2 控制台
  h2:
    console:
      enabled: false

  ai:
    vectorstore:
      pgvector:
        initialize-schema: true

  # 关闭 GitHub MCP SSE 客户端 (使用 HTTP POST 直连)
  mcp:
    client:
      enabled: false

server:
  port: ${PORT:8081}

# Render 上不需要 .env 文件，所有配置通过环境变量注入
# Render 会通过 Blueprint 自动注入 POSTGRES_* 环境变量
