spring:
  application:
    name: knowledge-agent-platform
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${POSTGRES_URL:jdbc:h2:file:./data/knowledge-agent-platform;DB_CLOSE_DELAY=-1}
    driver-class-name: ${POSTGRES_DRIVER:org.h2.Driver}
    username: ${POSTGRES_USER:sa}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Spring AI Configuration
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
      embedding:
        base-url: ${EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
        api-key: ${QWEN_API_KEY:}
        options:
          model: ${EMBEDDING_MODEL:text-embedding-v4}
          dimensions: ${EMBEDDING_DIMENSIONS:1536}
    mcp:
      client:
        enabled: ${GITHUB_MCP_ENABLED:false}
        name: knowledge-agent-platform
        version: 1.0.0
        type: SYNC
        request-timeout: ${GITHUB_MCP_REQUEST_TIMEOUT:30s}
        toolcallback:
          enabled: true
        streamable-http:
          connections:
            github:
              url: ${GITHUB_MCP_URL:https://api.githubcopilot.com}
              endpoint: ${GITHUB_MCP_ENDPOINT:/mcp/}
      server:
        enabled: true
        name: knowledge-agent-platform
        version: 1.0.0
        type: SYNC

server:
  port: ${PORT:8081}
  servlet:
    encoding:
      charset: UTF-8
      force: true

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

# Micrometer / Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-chat}

security:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

ai-platform:
  prompt-version: ${PROMPT_VERSION:prompt-v1}
  retrieval-version: ${RETRIEVAL_VERSION:hybrid-v1}
  retrieval-top-k: ${RETRIEVAL_TOP_K:3}
  model-version: ${DEEPSEEK_MODEL:deepseek-chat}
  embedding-provider: ${EMBEDDING_PROVIDER:aliyun-bailian}
  embedding-model: ${EMBEDDING_MODEL:text-embedding-v4}
  embedding-dimensions: ${EMBEDDING_DIMENSIONS:1536}
  llm-judge-enabled: ${LLM_JUDGE_ENABLED:true}
  judge-provider: qwen
  judge-model: ${QWEN_JUDGE_MODEL:qwen3.6-plus}
  rerank-enabled: ${RERANK_ENABLED:true}
  rerank-provider: aliyun-bailian
  rerank-model: ${BAILIAN_RERANK_MODEL:qwen3-rerank}
  rerank-candidate-multiplier: ${RERANK_CANDIDATE_MULTIPLIER:4}
  model-max-attempts: ${MODEL_MAX_ATTEMPTS:2}
  model-circuit-breaker-threshold: ${MODEL_CIRCUIT_BREAKER_THRESHOLD:3}
  model-circuit-breaker-open-ms: ${MODEL_CIRCUIT_BREAKER_OPEN_MS:30000}
  refresh-token-expiration-ms: ${REFRESH_TOKEN_EXPIRATION_MS:604800000}

judge:
  qwen:
    api-key: ${QWEN_API_KEY:}
    base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${QWEN_JUDGE_MODEL:qwen3.6-plus}
    timeout-seconds: ${QWEN_JUDGE_TIMEOUT_SECONDS:30}

rerank:
  bailian:
    api-key: ${QWEN_API_KEY:}
    base-url: ${BAILIAN_RERANK_BASE_URL:https://dashscope.aliyuncs.com/compatible-api/v1}
    model: ${BAILIAN_RERANK_MODEL:qwen3-rerank}
    timeout-seconds: ${BAILIAN_RERANK_TIMEOUT_SECONDS:30}

github:
  mcp:
    http:
      enabled: ${GITHUB_MCP_HTTP_ENABLED:false}
    token: ${GITHUB_MCP_TOKEN:}
    toolsets: ${GITHUB_MCP_TOOLSETS:}
    readonly: ${GITHUB_MCP_READONLY:}
