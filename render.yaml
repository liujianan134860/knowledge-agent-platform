# ──────────────────────────────────────────────
# Render Blueprint — 一键部署配置
# 使用方法:
#   1. 将代码推送到 GitHub
#   2. Render Dashboard → Blueprints → New
#   3. 连接仓库，Render 自动读取此文件
#   4. 填写 API Key 等机密环境变量
#   5. 等待部署完成 (~10 分钟)
# ──────────────────────────────────────────────

services:
  # ── PostgreSQL 16（Render 托管，自动备份，支持 pgvector）──
  - type: postgres
    name: knowledge-agent-db
    plan: free
    ipAllowList: []          # 仅允许内部服务连接
    databases:
      - name: knowledge_agent
    user: agent
    password: "AgentStrong!23" # 首次部署后请修改

  # ── Spring Boot Web 服务 ────────────────────────────────
  - type: web
    name: knowledge-agent-platform
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health

    envVars:
      # ── Spring 激活 Render 配置 ──
      - key: SPRING_PROFILES_ACTIVE
        value: render

      # ── DeepSeek LLM（⚠ 部署后填入真实 Key）──
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com

      # ── 阿里云 DashScope（Embedding + 评测 + Rerank 共用）──
      - key: QWEN_API_KEY
        sync: false
      - key: EMBEDDING_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: EMBEDDING_MODEL
        value: text-embedding-v4
      - key: EMBEDDING_DIMENSIONS
        value: "1536"
      - key: QWEN_JUDGE_MODEL
        value: qwen3.6-plus
      - key: BAILIAN_RERANK_MODEL
        value: qwen3-rerank

      # ── 清除本地 autoconfigure exclude（Render 使用 pgvector）──
      - key: spring.autoconfigure.exclude
        value: ""

      # ── JWT（自动生成）──
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"

      # ── GitHub MCP 工具 ──
      - key: GITHUB_MCP_HTTP_ENABLED
        value: "true"
      - key: GITHUB_MCP_ENABLED
        value: "false"
      - key: GITHUB_MCP_TOKEN
        sync: false
      - key: GITHUB_MCP_URL
        value: https://api.githubcopilot.com
      - key: GITHUB_MCP_ENDPOINT
        value: /mcp/

      # ── 功能开关 ──
      - key: LLM_JUDGE_ENABLED
        value: "true"
      - key: RERANK_ENABLED
        value: "true"

      # ⚠ 以下变量由 Render 自动注入（数据库链接），无需手动设置：
      # PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
